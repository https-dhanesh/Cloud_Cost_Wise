name: CloudCost_Wise DevSecOps CI

on:
  push:
    branches: [ main ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Backend Test & Audit
        env:
          MONGO_URI: mongodb://localhost:27017/test_db
          JWT_SECRET: "ci_test_secret"
        run: |
          cd backend
          npm ci
          npm test
          npm audit --audit-level=high # SCA Gate: Finds vulnerable libraries

      - name: Frontend Test & Audit
        run: |
          cd frontend
          npm ci
          npm test 
          npm audit --audit-level=high

  build-and-push:
    needs: test-and-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cloudcost-backend:${{ github.sha }} ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cloudcost-backend:${{ github.sha }}
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cloudcost-frontend:${{ github.sha }} ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cloudcost-frontend:${{ github.sha }}

  image-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/cloudcost-backend:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'