name: CloudCost_Wise DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: "**/package-lock.json"
      
      - name: Backend Tests
        env:
          MONGO_URI: mongodb://localhost:27017/test_db
          JWT_SECRET: "ci_test_secret"
        run: cd backend && npm ci && npm test
      
      - name: Frontend Tests
        run: cd frontend && npm ci && npm test

  build-and-push:
    needs: test-and-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cloudcost-backend:latest

      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cloudcost-frontend:latest

      - name: Run Trivy Security Scan (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/cloudcost-backend:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'